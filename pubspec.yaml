name: cinevault
description: CineVault - Every Movie. One Vault.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Scraping
  dio: ^5.4.0
  http: ^1.2.0
  html: ^0.15.4
  beautiful_soup_dart: ^0.3.0

  # Video Player
  better_player: ^0.0.84
  video_player: ^2.8.3
  chewie: ^1.7.4
  wakelock_plus: ^1.2.1

  # UI & Animation
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_staggered_animations: ^1.1.1
  smooth_page_indicator: ^1.1.0
  flutter_rating_bar: ^4.0.1
  readmore: ^3.0.0
  percent_indicator: ^4.2.3
  carousel_slider: ^4.2.1
  flutter_animate: ^4.5.0

  # Local Storage (No Firebase needed)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.2

  # State Management
  provider: ^6.1.2
  get: ^4.6.6

  # Navigation
  go_router: ^13.2.0

  # Search & Metadata

  # Utils
  google_fonts: ^6.2.1
  intl: ^0.19.0
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  flutter_svg: ^2.0.10+1
  palette_generator: ^0.3.3+3

  # Security & Crypto
  encrypt: ^5.0.3
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/images/icon_fg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/BebasNeue-Regular.ttf
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
