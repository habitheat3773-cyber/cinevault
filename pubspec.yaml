name: cinevault
description: CineVault - Every Movie. One Vault.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.4.0
  http: ^1.2.0
  html: ^0.15.4
  video_player: ^2.8.3
  chewie: ^1.7.4
  wakelock_plus: ^1.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  flutter_rating_bar: ^4.0.1
  carousel_slider: ^4.2.1
  flutter_animate: ^4.5.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.2
  get: ^4.6.6
  google_fonts: ^6.2.1
  intl: ^0.19.0
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
